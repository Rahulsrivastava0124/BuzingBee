<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=5"
    />
    <meta name="theme-color" content="#000000" />
    
    <!-- Performance: Preconnect to external resources -->
    <link rel="preconnect" href="https://api.buzingbee.com" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="dns-prefetch" href="https://connect.facebook.net" />
    <link rel="dns-prefetch" href="https://www.facebook.com" />
    
    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- SEO Meta Tags -->
    <meta
      name="description"
      content="BuzingBee: AI-powered marketing automation platform. Automate workflows, scale campaigns, and boost conversions with intelligent AI agents for digital marketing."
    />
    <meta
      name="keywords"
      content="marketing automation, AI agents, digital marketing, email automation, Google Ads, Meta Ads, AdSense optimization, website automation"
    />
    <meta name="author" content="BuzingBee" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />
    <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="bingbot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://www.buzingbee.com" />
    <link rel="alternate" hrefLang="en-US" href="https://www.buzingbee.com" />

    <!-- Open Graph Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://buzingbee.com" />
    <meta
      property="og:title"
      content="BuzingBee - AI Marketing Automation"
    />
    <meta
      property="og:description"
      content="Automate your marketing workflows and scale campaigns with AI-powered intelligence. Boost conversions without scaling your team."
    />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />
    <meta property="og:site_name" content="BuzingBee" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="BuzingBee - AI Marketing Automation"
    />
    <meta
      name="twitter:description"
      content="Automate your marketing workflows and scale campaigns with AI-powered intelligence."
    />
    <meta name="twitter:image" content="%PUBLIC_URL%/og-image.png" />
    <meta name="twitter:creator" content="@BuzingBee_" />

    <!-- Additional SEO -->
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    <meta name="distribution" content="global" />
    <meta name="rating" content="general" />
    <meta name="copyright" content="BuzingBee" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <!-- Mobile App Meta Tags -->
    <meta name="apple-mobile-web-app-title" content="BuzingBee" />
    <!-- Accessibility -->
    <meta name="color-scheme" content="light dark" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "name": "BuzingBee",
            "url": "https://www.buzingbee.com",
            "logo": "https://www.buzingbee.com/logo.png",
            "image": "https://www.buzingbee.com/og-image.png",
            "description": "BuzingBee is an AI-powered marketing automation platform that helps businesses automate workflows, scale campaigns, and boost conversions with intelligent AI agents.",
            "foundingDate": "2023",
            "sameAs": [
              "https://www.facebook.com/buzingbee",
              "https://twitter.com/buzingbee",
              "https://linkedin.com/company/buzingbee"
            ],
            "contactPoint": [
              {
                "@type": "ContactPoint",
                "contactType": "Sales",
                "telephone": "+1-950-798-1942",
                "areaServed": "Worldwide",
                "url": "https://www.buzingbee.com/contact"
              },
              {
                "@type": "ContactPoint",
                "contactType": "Customer Support",
                "url": "https://www.buzingbee.com/contact"
              }
            ]
          },
          {
            "@type": "LocalBusiness",
            "name": "BuzingBee",
            "url": "https://www.buzingbee.com",
            "telephone": "+1-950-798-1942",
            "areaServed": "Worldwide"
          },
          {
            "@type": "WebSite",
            "name": "BuzingBee",
            "url": "https://www.buzingbee.com/",
            "description": "AI-powered marketing automation platform for digital marketers",
            "potentialAction": {
              "@type": "SearchAction",
              "target": "https://www.buzingbee.com/?q={search_term_string}",
              "query-input": "required name=search_term_string"
            }
          },
          {
            "@type": "SiteNavigationElement",
            "name": "Home",
            "url": "https://www.buzingbee.com/",
            "position": 1
          },
          {
            "@type": "SiteNavigationElement",
            "name": "Services",
            "url": "https://www.buzingbee.com/services",
            "position": 2
          },
          {
            "@type": "SiteNavigationElement",
            "name": "About",
            "url": "https://www.buzingbee.com/about",
            "position": 3
          },
          {
            "@type": "SiteNavigationElement",
            "name": "Blog",
            "url": "https://www.buzingbee.com/blog",
            "position": 4
          },
          {
            "@type": "SiteNavigationElement",
            "name": "Contact",
            "url": "https://www.buzingbee.com/contact",
            "position": 5
          }
        ]
      }
    </script>
    <script>
      // Add to your website
      fetch(`https://api.buzingbee.com/api/analytics/track`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          website: "buzingbee", // Your website name
          page: window.location.pathname,
          device: /mobile/i.test(navigator.userAgent) ? "mobile" : "desktop",
          location: null, // Optional
        }),
      });
    </script>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- import daisy UI tailwindcss -->
    <!-- <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script> -->

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

      manifest.json provides metadata used when your web app is installed on a

    <title>BuzingBee - AI Marketing Automation Platform | Scale Your Campaigns</title>

  </head>
