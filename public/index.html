<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=5"
    />
    <meta name="theme-color" content="#000000" />

    <!-- SEO Meta Tags -->
    <meta
      name="description"
      content="BuzingBee - AI-Powered Marketing Automation Platform. Intelligent workflows for digital marketing, lead generation, email automation, and AI agents. Scale your marketing without scaling your team."
    />
    <meta
      name="keywords"
      content="marketing automation, AI agents, digital marketing, email automation, Google Ads, Meta Ads, AdSense optimization, website automation"
    />
    <meta name="author" content="BuzingBee" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />
    <link rel="canonical" href="https://buzingbee.com" />

    <!-- Open Graph Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://buzingbee.com" />
    <meta
      property="og:title"
      content="BuzingBee - AI Marketing Automation Platform"
    />
    <meta
      property="og:description"
      content="Intelligent workflows for digital marketing, lead generation, and customer engagement with AI agents."
    />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />
    <meta property="og:site_name" content="BuzingBee" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="BuzingBee - AI Marketing Automation Platform"
    />
    <meta
      name="twitter:description"
      content="Intelligent workflows for digital marketing, lead generation, and customer engagement with AI agents."
    />
    <meta name="twitter:image" content="%PUBLIC_URL%/og-image.png" />
    <meta name="twitter:creator" content="@BuzingBee_" />

    <!-- Additional SEO -->
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "name": "BuzingBee",
            "url": "https://buzingbee.com",
            "logo": "https://buzingbee.com/logo.png",
            "description": "BuzingBee - AI-Powered Marketing Automation Platform for digital marketing automation, AI agents, and intelligent marketing solutions.",
            "sameAs": [
              "https://www.facebook.com/buzingbee",
              "https://twitter.com/buzingbee",
              "https://linkedin.com/company/buzingbee"
            ],
            "contactPoint": {
              "@type": "ContactPoint",
              "contactType": "Sales",
              "telephone": "+1-950-798-1942",
              "areaServed": "Worldwide"
            }
          },
          {
            "@type": "WebSite",
            "name": "BuzingBee",
            "url": "https://buzingbee.com/",
            "potentialAction": {
              "@type": "SearchAction",
              "target": "https://buzingbee.com/?q={search_term_string}",
              "query-input": "required name=search_term_string"
            }
          },
          {
            "@type": "SiteNavigationElement",
            "name": "Home",
            "url": "https://buzingbee.com/"
          },
          {
            "@type": "SiteNavigationElement",
            "name": "Services",
            "url": "https://buzingbee.com/services"
          },
          {
            "@type": "SiteNavigationElement",
            "name": "About",
            "url": "https://buzingbee.com/about"
          },
          {
            "@type": "SiteNavigationElement",
            "name": "Blog",
            "url": "https://buzingbee.com/blog"
          },
          {
            "@type": "SiteNavigationElement",
            "name": "Contact",
            "url": "https://buzingbee.com/contact"
          }
        ]
      }
    </script>
    <script>
      // Add to your website
      fetch(`http://api.buzingbee.com/api/analytics/track`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          website: "buzingbee", // Your website name
          page: window.location.pathname,
          device: /mobile/i.test(navigator.userAgent) ? "mobile" : "desktop",
          location: null, // Optional
        }),
      });
    </script>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
