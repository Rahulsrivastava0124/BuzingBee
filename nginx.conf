server {
    listen 80;
    server_name ~^(?!www\.)(?<domain>.+)$;
    # Redirect non-www to www with 301
    return 301 http://www.$domain$request_uri;
}

server {
    listen 80;
    server_name www.buzingbee.com buzingbee.com;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/javascript application/json;
    gzip_disable "msie6";
    gzip_comp_level 6;

    # Performance: Enable HTTP/2
    http2_max_field_size 16k;
    http2_max_header_size 32k;

    # Serve robots.txt directly
    location = /robots.txt {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400";
    }

    # Serve sitemap.xml directly
    location = /sitemap.xml {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400";
    }

    # Serve other root-level files
    location ~* ^/(site\.webmanifest|schema\.json)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400";
    }

    # Cache HTML files with validation
    location ~* \.html?$ {
        add_header Cache-Control "public, must-revalidate, max-age=3600";
    }

    # Long-term cache for static assets with fingerprints
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Cache images
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Cache fonts
    location ~* \.(woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React Router refresh handling (must be last)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, must-revalidate, max-age=0";
    }
}
