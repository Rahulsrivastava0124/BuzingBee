server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve robots.txt directly
    location = /robots.txt {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400";
    }

    # Serve sitemap.xml directly
    location = /sitemap.xml {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400";
    }

    # Serve other root-level files
    location ~* ^/(site\.webmanifest|schema\.json)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400";
    }

    # Optional: long cache for static assets
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # React Router refresh handling (must be last)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
